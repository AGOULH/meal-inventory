<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة مخزون المحاليل الطبية</title>
<style>
  :root{
    --crimson:#127a3e; --crimson-dark:#0c5e30; --crimson-soft:#e7f4ec;
    --green-bright:#16a34a; --gold:#b8902e;
    --sidebar:#0a2c1a; --sidebar-line:rgba(255,255,255,.08); --sidebar-active:rgba(255,255,255,.10);
    --ink:#1f2530; --muted:#6b7280; --line:#e6e8ec; --bg:#f4f5f7;
    --card:#ffffff; --ok:#1f7a4d; --ok-soft:#e6f4ec; --warn:#b06f00;
    --warn-soft:#fff4e0; --yellow:#f4c430; --danger:#c0392b; --danger-soft:#fdecea;
    --info:#1f5f9e; --info-soft:#e8f1fb; --shadow:0 1px 2px rgba(16,24,40,.06),0 4px 14px rgba(16,24,40,.05);
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Segoe UI","Tajawal","Noto Sans Arabic",Tahoma,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  a{color:var(--crimson)}

  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 70% -10%,#b52440 0%,var(--crimson) 35%,var(--crimson-dark) 100%);padding:20px;z-index:50}
  .login-card{background:#fff;width:100%;max-width:380px;border-radius:18px;padding:30px 26px;box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center;position:relative}
  .lang-pill{position:absolute;top:14px;inset-inline-end:14px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--ink)}
  .login-mark{width:62px;height:62px;border-radius:16px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:var(--crimson-soft);color:var(--crimson);font-size:30px}
  .login-card h1{font-size:19px;margin:0 0 4px}
  .login-card p{color:var(--muted);font-size:13px;margin:0 0 22px}
  .field{text-align:start;margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-soft)}
  .btn{border:none;border-radius:var(--r-sm);padding:11px 16px;font-weight:700;font-size:15px;background:var(--crimson);color:#fff;transition:filter .15s,transform .02s}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
  .btn.full{width:100%}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)} .btn.ghost:hover{background:#f7f8fa}
  .btn.soft{background:var(--crimson-soft);color:var(--crimson)}
  .btn.danger{background:var(--danger)}
  .btn.sm{padding:7px 11px;font-size:13px;font-weight:600}
  .login-err{color:var(--danger);font-size:13px;min-height:18px;margin-top:6px}

  #app{display:none;min-height:100vh}
  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:10px 18px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mk{width:40px;height:40px;border-radius:11px;background:var(--crimson);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .brand .t1{font-weight:800;font-size:15px;white-space:nowrap}
  .brand .t2{color:var(--muted);font-size:12px;white-space:nowrap}
  .topbar .spacer{flex:1}
  .date-chip{font-size:12px;color:var(--muted);text-align:end;line-height:1.35}
  .date-chip b{color:var(--ink);font-weight:700}
  .lang-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 11px;font-size:13px;font-weight:700;color:var(--ink)}
  .lang-btn:hover{background:#f5f6f8}

  .layout{display:flex;align-items:flex-start}
  .side{width:235px;flex:none;padding:16px 12px;position:sticky;top:61px;height:calc(100vh - 61px);overflow:auto;border-inline-end:1px solid var(--line);background:#fff}
  .nav-group{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;padding:10px 10px 6px;text-transform:uppercase}
  .nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:start;border:none;background:none;padding:10px 11px;border-radius:10px;color:var(--ink);font-size:14px;font-weight:600;margin-bottom:2px}
  .nav-item .ic{width:22px;text-align:center;font-size:16px;flex:none}
  .nav-item:hover{background:#f5f6f8}
  .nav-item.active{background:var(--crimson-soft);color:var(--crimson)}
  .nav-item.active .ic{color:var(--crimson)}

  .main{flex:1;min-width:0;padding:22px 26px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h2{margin:0;font-size:21px}
  .page-head p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .head-actions{display:flex;gap:8px;flex-wrap:wrap}

  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .kpi .lbl{color:var(--muted);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
  .kpi .val{font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.danger{background:var(--danger)} .dot.info{background:var(--info)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .panel-h h3{margin:0;font-size:15px}
  .panel-h .hint{color:var(--muted);font-size:12px;font-weight:500}
  .panel-b{padding:16px}
  .two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:1000px){.two-col{grid-template-columns:1fr}}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .form-grid label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .form-grid input,.form-grid select,.form-grid textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none}
  .form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-soft)}
  .form-grid .full{grid-column:1/-1}
  .req:after{content:" *";color:var(--danger)}

  .tbl-wrap{overflow:auto;border-radius:var(--r-sm)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 12px;text-align:start;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:#fafbfc;color:var(--muted);font-weight:700;font-size:12.5px;position:sticky;top:0}
  tbody tr:hover{background:#fafbfc}
  td.num,th.num{text-align:center}
  .tag{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
  .tag.ok{background:var(--ok-soft);color:var(--ok)}
  .tag.warn{background:var(--warn-soft);color:var(--warn)}
  .tag.danger{background:var(--danger-soft);color:var(--danger)}
  .tag.info{background:var(--info-soft);color:var(--info)}
  .tag.mut{background:#eef0f3;color:var(--muted)}
  .mono{font-family:monospace}
  .row-actions{display:flex;gap:6px;justify-content:flex-start}
  .icon-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 8px;font-size:13px;color:var(--ink)}
  .icon-btn:hover{background:#f5f6f8}
  .icon-btn.danger{color:var(--danger);border-color:#f3c9c4}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:10px;padding-inline-start:38px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none}
  .search .si{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:#fff}
  .seg button{border:none;background:none;padding:9px 13px;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.active{background:var(--crimson);color:#fff}

  .empty{text-align:center;padding:42px 20px;color:var(--muted)}
  .empty .em-ic{font-size:36px;opacity:.5}
  .empty h4{margin:10px 0 4px;color:var(--ink)}

  .alert-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:9px}
  .alert-item .a-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;font-size:16px}
  .alert-item .a-tx{flex:1;min-width:0}
  .alert-item .a-tx b{display:block;font-size:14px}
  .alert-item .a-tx span{font-size:12px;color:var(--muted)}

  .bar-row{display:grid;grid-template-columns:130px 1fr 46px;align-items:center;gap:10px;margin-bottom:9px}
  .bar-row .bl{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{background:#eef0f3;border-radius:8px;height:22px;overflow:hidden}
  .bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--crimson),#c93350);min-width:2px;transition:width .5s}
  .bar-val{font-size:13px;font-weight:700;text-align:end}
  .donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .legend{display:flex;flex-direction:column;gap:7px;font-size:13px}
  .legend .li{display:flex;align-items:center;gap:8px}

  .label-card{border:1px dashed var(--line);border-radius:var(--r-sm);padding:18px;text-align:center;background:#fff}
  .label-card .lc-name{font-weight:800;font-size:16px;margin-bottom:2px}
  .label-card .lc-meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .label-card svg{max-width:100%}
  .label-card .lc-code{font-family:monospace;letter-spacing:2px;margin-top:6px;font-size:14px}

  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:92vh;overflow:auto}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal-h h3{margin:0;font-size:17px}
  .modal-h .x{border:none;background:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .modal-b{padding:18px}
  .modal-f{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:90;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{background:var(--ok)} #toast.err{background:var(--danger)}

  .help-box{background:var(--info-soft);border:1px solid #cfe0f3;border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:#284b6e}
  .help-box code{background:#fff;padding:1px 6px;border-radius:5px;border:1px solid #cfe0f3}
  .muted{color:var(--muted)}
  .stat-line{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:4px}
  hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0}
  .menu-toggle{display:none;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 10px;font-size:17px}

  @media(max-width:760px){
    .side{position:fixed;inset-inline-start:0;top:61px;transition:.2s;box-shadow:-6px 0 24px rgba(0,0,0,.12);z-index:40}
    .main{padding:16px 14px}
    .menu-toggle{display:inline-flex!important}
    .date-chip{display:none}
    [dir=rtl] .side{transform:translateX(110%)} [dir=rtl] .side.open{transform:translateX(0)}
    [dir=ltr] .side{transform:translateX(-110%)} [dir=ltr] .side.open{transform:translateX(0)}
  }
  @media print{
    body{background:#fff}
    .topbar,.side,.head-actions,.no-print,.toolbar,.panel-h .btn{display:none!important}
    .main{padding:0}
    .panel{box-shadow:none;border:none;margin:0}
    .label-card{border:1px solid #000;page-break-inside:avoid}
    th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .tag{border:1px solid #999;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .print-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  }

  /* === Ministry of Health identity === */
  .side{background:var(--sidebar);border-inline-end:1px solid var(--sidebar-line)}
  .nav-group{color:rgba(255,255,255,.45)}
  .nav-item{color:rgba(255,255,255,.85)}
  .nav-item .ic{color:rgba(255,255,255,.7)}
  .nav-item:hover{background:rgba(255,255,255,.07)}
  .nav-item.active{background:var(--sidebar-active);color:#fff}
  .nav-item.active .ic{color:var(--green-bright)}
  .bar-fill{background:linear-gradient(90deg,var(--crimson-dark),var(--green-bright))}
  #login{background:radial-gradient(1200px 600px at 75% -10%,#1f9a55 0%,#0e7a3f 38%,#075a2e 100%)}
  .login-logo{display:flex;justify-content:center;margin-bottom:16px}
  .moh-lock{display:inline-flex;align-items:center;gap:11px}
  .moh-emblem{width:46px;height:46px;flex:none} .moh-emblem svg{width:100%;height:100%}
  .moh-words{display:flex;flex-direction:column;line-height:1.12;text-align:start}
  .moh-words b{font-size:17px;font-weight:800;color:var(--crimson-dark)}
  .moh-words i{font-size:10.5px;font-style:normal;color:var(--crimson);font-weight:600}
  .login-card h1{color:var(--crimson-dark)}
  .login-sys{color:var(--crimson);font-weight:700;font-size:14px;margin:2px 0 0}
  .login-min{color:var(--muted);font-size:12.5px;margin:8px 0 0}
  .brand .mk{background:var(--crimson-soft)} .brand .mk svg{width:24px;height:24px}
  .kpi{display:flex;align-items:center;gap:14px}
  .kpi-body{flex:1;min-width:0}
  .kpi-ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:23px;color:#fff;flex:none}
  .kpi-ic.greend{background:var(--crimson-dark)} .kpi-ic.green{background:var(--green-bright)}
  .kpi-ic.yellow{background:var(--yellow);color:#5a4500} .kpi-ic.red{background:var(--danger)} .kpi-ic.blue{background:var(--info)}
  .fab-guide{position:fixed;bottom:20px;left:20px;width:54px;height:54px;border-radius:50%;background:var(--crimson);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(0,0,0,.28);z-index:35}
  .fab-guide:hover{filter:brightness(1.08)}
  .fab-guide svg{width:26px;height:26px}
  .guide-intro{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .gcard{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .gcard-h{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer}
  .gcard-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .gcard-t{flex:1;min-width:0}.gcard-t b{display:block;font-size:14.5px}.gcard-t span{font-size:12px;color:var(--muted)}
  .gcard-ch{color:var(--muted);transition:transform .2s;font-size:18px}
  .gcard.open .gcard-ch{transform:rotate(-90deg)}
  .gcard-b{display:none;padding:2px 15px 14px;background:rgba(255,255,255,.55)}
  .gcard.open .gcard-b{display:block}
  .gcard-b ol{margin:0;padding-inline-start:20px}.gcard-b li{margin-bottom:7px;line-height:1.6;font-size:13.5px}
  .g-purple{background:#f1effc}.g-purple .gcard-ic{background:#e7e1fb;color:#6b4fd6}
  .g-green{background:#e9f6ef}.g-green .gcard-ic{background:#d3edde;color:#1f8a4c}
  .g-orange{background:#fdf1e4}.g-orange .gcard-ic{background:#f9e0c6;color:#d6831f}
  .g-blue{background:#eaf1fc}.g-blue .gcard-ic{background:#d4e3f7;color:#2f6fd0}
  .g-pink{background:#fcf0f5}.g-pink .gcard-ic{background:#f6d9e6;color:#c84f80}
  .g-cyan{background:#e8f6f6}.g-cyan .gcard-ic{background:#cdebeb;color:#1f8a8a}
  .cat-box{background:var(--crimson-soft);border:1px solid #cfe7d8;border-radius:12px;padding:14px;margin-bottom:16px}
  .cat-h{font-weight:800;font-size:14px;color:var(--crimson-dark);margin-bottom:10px}
  .cat-info{font-size:13px;margin-top:10px;font-weight:700;color:var(--crimson-dark);min-height:18px}
  /* === Collapsible sidebar + profile === */
  .side{display:flex;flex-direction:column;padding:8px 8px 0;gap:0}
  .side-top{display:flex;padding:4px 4px 6px}
  .side-toggle{background:none;border:none;color:rgba(255,255,255,.7);padding:8px;border-radius:9px;cursor:pointer;display:flex}
  .side-toggle svg{width:20px;height:20px}
  .side-toggle:hover{background:rgba(255,255,255,.08)}
  .nav-scroll{flex:1;overflow:auto;min-height:0}
  .nav-item{margin-bottom:4px}
  .nav-item .ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex:none}
  .nav-item .ic svg{width:20px;height:20px}
  .side-foot{border-top:1px solid var(--sidebar-line);padding:8px 4px;margin-top:6px}
  .side-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px;border-radius:11px}
  .side-user:hover{background:rgba(255,255,255,.07)}
  .su-info{flex:1;min-width:0}
  .su-info b{display:block;color:#fff;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .su-info span{color:rgba(255,255,255,.5);font-size:11px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--green-bright);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex:none}
  .side.collapsed{width:68px}
  .side.collapsed .lbl-t{display:none}
  .side.collapsed .nav-item{justify-content:center;padding:11px 0}
  .side.collapsed .su-info{display:none}
  .side.collapsed .side-user{justify-content:center;padding:8px 0}
  .side.collapsed .side-top{justify-content:center}
  @media(max-width:760px){
    .fab-guide{bottom:16px;left:16px;width:48px;height:48px;font-size:21px}
    .side-toggle{display:none}
    .side.collapsed{width:235px}
    .side.collapsed .lbl-t{display:inline}
    .side.collapsed .su-info{display:block}
    .side.collapsed .nav-item{justify-content:flex-start;padding:10px 11px}
  }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <button class="lang-pill" data-i18n-lang onclick="App.toggleLang()">English</button>
    <div class="login-logo"><span class="moh-lock"><span class="moh-emblem"><svg viewBox="0 0 64 64" fill="none" stroke="var(--gold)" stroke-width="3.4" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><path d="M32 58 V31"/><path d="M32 31 C25 27 19 27 14 31"/><path d="M32 31 C39 27 45 27 50 31"/><path d="M32 31 C27 24 22 21 17 19"/><path d="M32 31 C37 24 42 21 47 19"/><path d="M32 31 C31 23 31 17 32 12"/></svg></span><span class="moh-words"><b>وزارة الصحة</b><i>Ministry of Health</i></span></span></div>
    <h1 data-i18n="org">بنك الدم المركزي بالدمام</h1>

function normalize(d){ const base=blank(); d=d||{}; const incoming=d.settings||{}; const hadUsers=Array.isArray(incoming.users)&&incoming.users.length>0;
  d.settings=Object.assign(base.settings,incoming); d.items=d.items||[]; d.lots=d.lots||[]; d.txns=d.txns||[]; d.settings.customLabs=d.settings.customLabs||[];

function fmtH(iso){ if(!iso)return ""; try{ const l=LANG==="en"?"en-SA-u-ca-islamic-umalqura":"ar-SA-u-ca-islamic-umalqura";
  return new Intl.DateTimeFormat(l,{year:"numeric",month:"long",day:"numeric"}).format(new Date(iso+"T00:00:00"))+t("hijri_suffix"); }catch(e){return "";} }

/* ===================== Derived ===================== */
const isRej=l=>!!l.rejected;
const availLots=code=>DB.lots.filter(l=>l.code===code&&l.qtyRemaining>0&&!isRej(l)).sort((a,b)=>(a.expiry||"9999").localeCompare(b.expiry||"9999"));
const allLotsOf=code=>DB.lots.filter(l=>l.code===code).sort((a,b)=>(a.expiry||"9999").localeCompare(b.expiry||"9999"));
const availQtyOf=code=>DB.lots.filter(l=>l.code===code&&!isRej(l)).reduce((s,l)=>s+(+l.qtyRemaining||0),0);
const rejectedQtyOf=code=>DB.lots.filter(l=>l.code===code&&isRej(l)).reduce((s,l)=>s+(+l.qtyRemaining||0),0);
function lotStatus(l){
  if(isRej(l)) return {cls:"danger",key:"lst_rejected"};
  if((+l.qtyRemaining||0)<=0) return {cls:"mut",key:"lst_empty"};
  if(!l.expiry) return {cls:"info",key:"lst_no_date"};
  const d=daysTo(l.expiry);
  if(d<0) return {cls:"danger",key:"lst_expired"};
  if(d<=DB.settings.warnDays) return {cls:"warn",key:"lst_near",n:d};
  return {cls:"ok",key:"lst_valid"};
}
function lotStatusText(s){ return s.key==="lst_near"?t("lst_near",{n:s.n}):t(s.key); }
function itemStatus(it){
  const q=availQtyOf(it.code); const lots=availLots(it.code);
  const hasExpired=lots.some(l=>l.expiry&&daysTo(l.expiry)<0);
  const hasNear=lots.some(l=>l.expiry&&daysTo(l.expiry)>=0&&daysTo(l.expiry)<=DB.settings.warnDays);
  if(q<=0) return {cls:"mut",key:"st_out"};
  if(hasExpired) return {cls:"danger",key:"st_has_expired"};
  if(q<=(+it.minQty||0)) return {cls:"warn",key:"st_low"};
  if(hasNear) return {cls:"warn",key:"st_near"};
  return {cls:"ok",key:"st_available"};
}

pages.dashboard=()=>{

  const totalItems=items.length;
  const totalUnits=DB.lots.filter(l=>!isRej(l)).reduce((s,l)=>s+(+l.qtyRemaining||0),0);

  const low=items.filter(it=>{const q=availQtyOf(it.code);return q>0&&q<=(+it.minQty||0);});
  const rejected=DB.lots.filter(l=>l.qtyRemaining>0&&isRej(l));
  const todayMoves=DB.txns.filter(x=>x.date===todayISO());

  DB.txns.filter(x=>x.type==="out").forEach(x=>{const it=items.find(i=>i.code===x.code);const n=it?it.name:x.code;consMap[n]=(consMap[n]||0)+(+x.qty||0);});
  const cons=Object.entries(consMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxC=cons.length?Math.max(...cons.map(c=>c[1])):1;

  const alerts=[];
  expired.forEach(l=>{const it=items.find(i=>i.code===l.code);alerts.push({cls:"danger",ic:"⛔",ti:`${it?it.name:l.code} — ${t("lot_label")} ${l.lot||"—"}`,s:t("alert_expired_s",{n:Math.abs(daysTo(l.expiry)),q:num(l.qtyRemaining)})});});
  rejected.forEach(l=>{const it=items.find(i=>i.code===l.code);alerts.push({cls:"danger",ic:"🚫",ti:`${it?it.name:l.code} — ${t("lot_label")} ${l.lot||"—"}`,s:t("alert_rejected_s",{q:num(l.qtyRemaining)})});});

  const okC=DB.lots.filter(l=>l.qtyRemaining>0&&!isRej(l)&&(!l.expiry||daysTo(l.expiry)>DB.settings.warnDays)).length;

    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("kpi_items")}</div><div class="val">${num(totalItems)}</div><div class="sub">${t("kpi_items_sub")}</div></div><div class="kpi-ic greend">📦</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("kpi_units")}</div><div class="val">${num(totalUnits)}</div><div class="sub">${t("kpi_units_sub")}</div></div><div class="kpi-ic green">🧊</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("kpi_near")}</div><div class="val">${num(near.length)}</div><div class="sub">${t("kpi_near_sub",{n:DB.settings.warnDays})}</div></div><div class="kpi-ic yellow">🕐</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("kpi_expired")}</div><div class="val">${num(expired.length)}</div><div class="sub">${t("kpi_expired_sub")}</div></div><div class="kpi-ic red">⛔</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("kpi_low")}</div><div class="val">${num(low.length)}</div><div class="sub">${t("kpi_low_sub")}</div></div><div class="kpi-ic yellow">📉</div></div>
    <div class="kpi"><div class="kpi-body"><div class="lbl">${t("kpi_rejected")}</div><div class="val">${num(rejected.length)}</div><div class="sub">${t("kpi_rejected_sub")}</div></div><div class="kpi-ic red">🚫</div></div>

    <div class="panel"><div class="panel-h"><h3>${t("panel_most_consumed")}</h3><span class="hint">${t("hint_by_dispense")}</span></div><div class="panel-b">
      ${cons.length? cons.map(c=>`<div class="bar-row"><div class="bl" title="${esc(c[0])}">${esc(c[0])}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,(c[1]/maxC*100)).toFixed(1)}%"></div></div><div class="bar-val">${num(c[1])}</div></div>`).join(""):emptyMini(t("no_dispense"))}
    </div></div>
    <div class="panel"><div class="panel-h"><h3>${t("panel_lot_health")}</h3></div><div class="panel-b">

    ${alerts.length? alerts.slice(0,12).map(a=>`<div class="alert-item"><div class="a-ic" style="background:var(--${a.cls}-soft);color:var(--${a.cls})">${a.ic}</div><div class="a-tx"><b>${esc(a.ti)}</b><span>${esc(a.s)}</span></div></div>`).join("")
    :`<div class="empty"><div class="em-ic">✅</div><h4>${t("all_good_t")}</h4><p>${t("all_good_s")}</p></div>`}
  </div></div>`;
};
function donut(data){
  const total=data.reduce((s,d)=>s+d.v,0)||1; let acc=0; const R=52,C=2*Math.PI*R; const segs=[];
  data.forEach(d=>{const len=d.v/total*C;
    segs.push(`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${d.c}" stroke-width="20" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc).toFixed(2)}" transform="rotate(-90 70 70)"/>`); acc+=len;});
  const tot=data.reduce((s,d)=>s+d.v,0);
  return `<svg width="140" height="140" viewBox="0 0 140 140"><circle r="${R}" cx="70" cy="70" fill="none" stroke="#eef0f3" stroke-width="20"/>${tot?segs.join(""):""}<text x="70" y="66" text-anchor="middle" font-size="26" font-weight="800" fill="#1f2530">${num(tot)}</text><text x="70" y="86" text-anchor="middle" font-size="12" fill="#6b7280">${t("lot_unit")}</text></svg>`;
}

function matchFilter(it){
  const st=itemStatus(it).key; const q=availQtyOf(it.code);
  if(invFilter==="all")return true;
  if(invFilter==="ok")return st==="st_available";
  if(invFilter==="warn")return st==="st_low"||st==="st_near";
  if(invFilter==="danger")return st==="st_has_expired"||availLots(it.code).some(l=>l.expiry&&daysTo(l.expiry)<0)||rejectedQtyOf(it.code)>0;
  if(invFilter==="out")return q<=0;
  return true;
}

function expHint(){ const v=$("rc-exp").value; $("rc-exphint").textContent=v?fmtH(v):""; }
function doReceive(print){
  const v=id=>$(id).value.trim();
  const code=v("rc-code"),name=v("rc-name"),lot=v("rc-lot"),exp=$("rc-exp").value,qty=+$("rc-qty").value;
  const insp=$("rc-insp").value, lab=$("rc-lab").value, rejected=(insp==="rejected");

  if(!exp)return toast(t("err_exp"),"err");
  if(!qty||qty<=0)return toast(t("err_qty"),"err");
  if(daysTo(exp)<0&&!confirm(t("confirm_past_exp")))return;
  let it=DB.items.find(i=>i.code===code);
  if(!it){ it={id:uid(),code,name,manufacturer:v("rc-man"),category:$("rc-cat").value,unit:$("rc-unit").value,minQty:+$("rc-min").value||0,createdAt:new Date().toISOString()}; DB.items.push(it); }
  else{ it.name=name||it.name; it.manufacturer=v("rc-man")||it.manufacturer; it.category=$("rc-cat").value; it.unit=$("rc-unit").value; it.minQty=+$("rc-min").value||0; }
  let lotRec = !rejected && DB.lots.find(l=>l.code===code&&l.lot===lot&&l.expiry===exp&&!isRej(l));
  if(lotRec){ lotRec.qtyReceived+=qty; lotRec.qtyRemaining+=qty; }
  else{ DB.lots.push({id:uid(),code,lot,expiry:exp,qtyReceived:qty,qtyRemaining:qty,supplier:v("rc-sup"),lab,inspection:insp,rejected,receivedAt:($("rc-date").value||todayISO())}); }
  DB.txns.push({id:uid(),type:"in",code,lot,qty,date:($("rc-date").value||todayISO()),party:v("rc-sup")||t("party_incoming"),lab,inspection:insp,note:v("rc-note"),user:curUser()});
  save();
  toast(rejected?t("ok_receive_rejected"):t("ok_receive"), rejected?"err":"ok");
  if(print){ go("barcode"); setTimeout(()=>pickBarcode(code,lot),60); } else go("receive");
}

function doDispense(){
  const code=$("ds-code").value, qty=+$("ds-qty").value;
  if(!code)return toast(t("err_pick_item"),"err");
  if(!qty||qty<=0)return toast(t("err_qty"),"err");
  const avail=availQtyOf(code);
  if(qty>avail)return toast(t("err_over",{q:num(qty),a:num(avail)}),"err");
  let rem=qty; const used=[]; for(const l of availLots(code)){if(rem<=0)break;const take=Math.min(rem,l.qtyRemaining);l.qtyRemaining-=take;rem-=take;used.push(l.lot||"—");}
  const lab=$("ds-lab").value;
  DB.txns.push({id:uid(),type:"out",code,lot:used.join(", "),qty,date:$("ds-date").value||todayISO(),party:labelOf(labs(),lab),lab,note:$("ds-note").value.trim(),user:curUser()});
  save(); toast(t("ok_dispense"),"ok"); go("dispense");
}

function labelHTML(){

  w.document.close();

const C39={'0':'nnnwwnwnn','1':'wnnwnnnnw','2':'nnwwnnnnw','3':'wnwwnnnnn','4':'nnnwwnnnw','5':'wnnwwnnnn','6':'nnwwwnnnn','7':'nnnwnnwnw','8':'wnnwnnwnn','9':'nnwwnnwnn','A':'wnnnnwnnw','B':'nnwnnwnnw','C':'wnwnnwnnn','D':'nnnnwwnnw','E':'wnnnwwnnn','F':'nnwnwwnnn','G':'nnnnnwwnw','H':'wnnnnwwnn','I':'nnwnnwwnn','J':'nnnnwwwnn','K':'wnnnnnnww','L':'nnwnnnnww','M':'wnwnnnnwn','N':'nnnnwnnww','O':'wnnnwnnwn','P':'nnwnwnnwn','Q':'nnnnnnwww','R':'wnnnnnwwn','S':'nnwnnnwwn','T':'nnnnwnwwn','U':'wwnnnnnnw','V':'nwwnnnnnw','W':'wwwnnnnnn','X':'nwnnwnnnw','Y':'wwnnwnnnn','Z':'nwwnwnnnn','-':'nwnnnnwnw','.':'wwnnnnwnn',' ':'nwwnnnwnn','$':'nwnwnwnnn','/':'nwnwnnnwn','+':'nwnnnwnwn','%':'nnnwnwnwn','*':'nwnnwnwnn'};
function code39SVG(text){
  text=text.toUpperCase().replace(/[^0-9A-Z\-\.\ \$\/\+%]/g,"-"); const seq="*"+text+"*"; const NW=2,WW=6,H=64,gap=2; let x=0; const r=[];
  for(const ch of seq){const p=C39[ch]; if(!p)continue; for(let i=0;i<p.length;i++){const w=p[i]==='w'?WW:NW; if(i%2===0)r.push(`<rect x="${x}" y="0" width="${w}" height="${H}" fill="#000"/>`); x+=w;} x+=gap;}
  return `<svg width="${Math.min(x,460)}" viewBox="0 0 ${x} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="height:64px">${r.join("")}</svg>`;
}

function renderLog(){
  const s=logSearch.trim().toLowerCase();
  let rows=DB.txns.filter(x=>(logType==="all"||x.type===logType)&&(!s||[x.code,x.party,x.note,x.lot,labelOf(labs(),x.lab)].some(v=>String(v||"").toLowerCase().includes(s)))).sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(b.id>a.id?1:-1));
  if(!rows.length){ $("logBody").innerHTML=`<div class="empty"><div class="em-ic">📜</div><h4>${t("log_empty")}</h4></div>`; return; }

function importTemplate(){
  const csv="\uFEFFcode,name,manufacturer,category,unit,minQty,lot,expiry,qty,supplier,lab,inspection\n"+
    "VIR-1,HIV AG/AB COMBO,Abbott,virology,test,200,LOT2025A,2027-06-01,500,Main Supplier,serology,accepted\n";
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}), url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="import-template.csv"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function parseCSV(text){
  text=String(text).replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const rows=[]; let row=[], field="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else { if(c==='"') q=true; else if(c===","){ row.push(field); field=""; } else if(c==="\n"){ row.push(field); rows.push(row); row=[]; field=""; } else field+=c; } }
  if(field!==""||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}
function mapKey(list,val,fb){ if(val==null||val==="")return fb; const s=String(val).trim().toLowerCase(); const o=list.find(x=>String(x.k).toLowerCase()===s||String(x.ar).toLowerCase()===s||String(x.en).toLowerCase()===s); return o?o.k:fb; }
function normDate(s){ s=String(s||"").trim(); if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s; const d=new Date(s); return isNaN(d.getTime())?s:d.toISOString().slice(0,10); }
function importFile(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const rows=parseCSV(rd.result);
    if(rows.length<2){ impRows=[]; $("imp-preview").innerHTML=`<div class="help-box">${t("imp_none")}</div>`; return; }
    const head=rows[0].map(h=>String(h).replace(/^\uFEFF/,"").trim().toLowerCase());
    const idx=n=>head.indexOf(n);
    if(["code","name","lot","expiry","qty"].some(n=>idx(n)<0)){ impRows=[]; $("imp-preview").innerHTML=`<div class="help-box">${t("imp_cols_missing")}</div>`; return; }
    impRows=[];
    for(let r=1;r<rows.length;r++){ const c=rows[r], g=n=>{ const i=idx(n); return i>=0?String(c[i]||"").trim():""; };
      const code=g("code"),name=g("name"),lot=g("lot"),exp=normDate(g("expiry")),qty=+g("qty");
      if(!code||!name||!lot||!exp||!qty||qty<=0) continue;
      impRows.push({code,name,manufacturer:g("manufacturer"),category:mapKey(CATS,g("category"),"other"),unit:mapKey(UNITS,g("unit"),"test"),minQty:+g("minqty")||0,lot,expiry:exp,qty,supplier:g("supplier"),lab:mapKey(labs(),g("lab"),"store"),inspection:mapKey(INSPECT,g("inspection"),"accepted")});
    }
    ev.target.value="";
    if(!impRows.length){ $("imp-preview").innerHTML=`<div class="help-box">${t("imp_none")}</div>`; return; }
    $("imp-preview").innerHTML=`<div class="panel" style="margin-top:6px"><div class="panel-h"><h3>${t("imp_preview_h",{n:impRows.length})}</h3><button class="btn" onclick="App.importRows()">${t("imp_do",{n:impRows.length})}</button></div><div class="panel-b"><div class="tbl-wrap"><table><thead><tr><th>${t("th_code")}</th><th>${t("th_name")}</th><th>${t("f_lot")}</th><th>${t("th_exp")}</th><th class="num">${t("th_qty")}</th><th>${t("f_lab")}</th><th>${t("f_inspection")}</th></tr></thead><tbody>${impRows.slice(0,80).map(x=>`<tr><td><span class="tag mut mono">${esc(x.code)}</span></td><td>${esc(x.name)}</td><td>${esc(x.lot)}</td><td>${esc(fmtG(x.expiry))}</td><td class="num">${num(x.qty)}</td><td>${esc(labelOf(labs(),x.lab))}</td><td>${x.inspection==="rejected"?`<span class="tag danger">${esc(labelOf(INSPECT,"rejected"))}</span>`:`<span class="tag ok">${esc(labelOf(INSPECT,"accepted"))}</span>`}</td></tr>`).join("")}</tbody></table></div>${impRows.length>80?`<p class="muted" style="font-size:12px">${t("imp_more",{n:impRows.length-80})}</p>`:""}</div></div>`;
  }catch(e){ $("imp-preview").innerHTML=`<div class="help-box">${t("imp_bad")}</div>`; } };
  rd.onerror=()=>{ $("imp-preview").innerHTML=`<div class="help-box">${t("imp_bad")}</div>`; };
  rd.readAsText(f,"utf-8");
}
function importRows(){
  if(!impRows.length)return;
  let n=0;
  impRows.forEach(x=>{ const rejected=x.inspection==="rejected";
    let it=DB.items.find(i=>i.code===x.code);
    if(!it){ it={id:uid(),code:x.code,name:x.name,manufacturer:x.manufacturer,category:x.category,unit:x.unit,minQty:x.minQty,createdAt:new Date().toISOString()}; DB.items.push(it); }
    else { it.name=x.name||it.name; if(x.manufacturer)it.manufacturer=x.manufacturer; }
    let lotRec=!rejected&&DB.lots.find(l=>l.code===x.code&&l.lot===x.lot&&l.expiry===x.expiry&&!isRej(l));
    if(lotRec){ lotRec.qtyReceived+=x.qty; lotRec.qtyRemaining+=x.qty; }

}

/* CSV export (Excel-friendly, UTF-8 BOM) */
function exportCSV(kind){
  let rows=[], name="";
  if(kind==="inventory"){
    name=t("fn_inventory"); rows.push([t("th_code"),t("th_name"),t("th_man"),t("th_cat"),t("th_unit"),t("th_qty"),t("f_min"),t("th_lots"),t("th_status")]);
    DB.items.forEach(it=>{const active=availLots(it.code);rows.push([it.code,it.name,it.manufacturer||"",labelOf(CATS,it.category),labelOf(UNITS,it.unit),availQtyOf(it.code),it.minQty||0,active.length,t(itemStatus(it).key)]);});
  }else if(kind==="log"){
    name=t("fn_log"); rows.push([t("th_date"),t("th_type"),t("th_code"),t("th_name"),t("th_lot"),t("th_qty"),t("th_lab"),t("th_party"),t("col_inspection"),t("th_user"),t("th_notes")]);
    const tt={in:t("f_in"),out:t("f_out"),adjust:t("f_adjust")};
    DB.txns.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).forEach(x=>{const it=DB.items.find(i=>i.code===x.code);rows.push([x.date,tt[x.type]||x.type,x.code,it?it.name:"",x.lot||"",(x.type==="out"?"-":"+")+x.qty,labelOf(labs(),x.lab),x.party||"",x.inspection?labelOf(INSPECT,x.inspection):"",x.user||"",x.note||""]);});
  }else if(kind==="expiry"){
    name=t("fn_expiry"); rows.push([t("th_name"),t("th_code"),t("th_lot"),t("th_exp"),t("th_remaining"),t("days_left"),t("th_lab"),t("col_inspection"),t("th_status")]);
    DB.lots.filter(l=>l.qtyRemaining>0).sort((a,b)=>(a.expiry||"9999").localeCompare(b.expiry||"9999")).forEach(l=>{const it=DB.items.find(i=>i.code===l.code);const st=lotStatus(l);rows.push([it?it.name:"",l.code,l.lot||"",l.expiry||"",l.qtyRemaining,l.expiry?daysTo(l.expiry):"",labelOf(labs(),l.lab),l.inspection?labelOf(INSPECT,l.inspection):"",lotStatusText(st)]);});
  }else if(kind==="consumption"){
    name=t("fn_consumption"); rows.push([t("th_name"),t("th_code"),t("th_total_dispensed")]);
    const m={};DB.txns.filter(x=>x.type==="out").forEach(x=>{m[x.code]=(m[x.code]||0)+(+x.qty||0);});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).forEach(([code,q])=>{const it=DB.items.find(i=>i.code===code);rows.push([it?it.name:code,code,q]);});
  }else if(kind==="labusage"){
    name=t("fn_labusage"); rows.push([t("th_lab"),t("th_total_dispensed")]);
    const m={};DB.txns.filter(x=>x.type==="out").forEach(x=>{const key=x.lab||"—";m[key]=(m[key]||0)+(+x.qty||0);});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).forEach(([k,q])=>rows.push([labelOf(labs(),k),q]));
  }
  if(rows.length<=1)return toast(t("no_export_data"),"err");
  const csv="\uFEFF"+rows.map(r=>r.map(c=>{c=String(c==null?"":c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\r\n");
  download(new Blob([csv],{type:"text/csv;charset=utf-8"}),`${name}_${todayISO()}.csv`);
  toast(t("ok_exported"),"ok");
}
function download(blob,filename){
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
}

const SYNC_KEY="inv_sync_cfg";
var fbApp=null, fbDoc=null, fbUnsub=null, syncState="off", applyingRemote=false, pushTimer=null;
const BUILTIN_SYNC={workspace:"bloodbank-dammam",config:{apiKey:"AIzaSyBLs1q9ryZZYI5Br9yBi7sSXk-92HVklRI",authDomain:"bloodbank-dammam.firebaseapp.com",projectId:"bloodbank-dammam",storageBucket:"bloodbank-dammam.firebasestorage.app",messagingSenderId:"165465917721",appId:"1:165465917721:web:2989e02513f51e6c101d88"}};
function getSyncCfg(){ try{ const ls=JSON.parse(localStorage.getItem(SYNC_KEY)||"null"); if(ls&&ls.config&&ls.config.projectId&&ls.workspace) return ls; }catch(e){} return (BUILTIN_SYNC&&BUILTIN_SYNC.config&&BUILTIN_SYNC.config.projectId&&BUILTIN_SYNC.workspace)?BUILTIN_SYNC:null; }
function setSyncStatus(s){ syncState=s; const el=$("syncBadge"); if(!el)return;
  const cls={off:"mut",connecting:"info",live:"ok",error:"danger",offline:"warn"};
  const key={off:"sync_off",connecting:"sync_connecting",live:"sync_live",error:"sync_error",offline:"sync_offline"};
  el.className="tag "+(cls[s]||"mut"); el.textContent=t(key[s]||"sync_off"); }
function loadJS(src){ return new Promise((res,rej)=>{ if([...document.scripts].some(x=>x.src===src)){res();return;}
  const sc=document.createElement("script"); sc.src=src; sc.onload=()=>res(); sc.onerror=()=>rej(new Error("load")); document.head.appendChild(sc); }); }
async function ensureFB(){ if(window.firebase&&window.firebase.firestore)return;
  await loadJS("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
  await loadJS("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"); }
function parseCfg(txt){ try{return JSON.parse(txt);}catch(e){} try{return (new Function("return ("+txt+")"))();}catch(e){return null;} }
function adoptRemote(data){ applyingRemote=true; try{ DB=normalize(data); localStorage.setItem(KEY,JSON.stringify(DB));
  if($("app").style.display==="block") go(location.hash.replace("#","")||"dashboard"); }finally{ applyingRemote=false; } }
function pushNow(){ if(!fbDoc)return Promise.resolve(); return fbDoc.set({data:DB,updatedAt:Date.now(),by:curUser()}); }
function schedulePush(){ if(!fbDoc||applyingRemote)return; clearTimeout(pushTimer); pushTimer=setTimeout(()=>{ pushNow().catch(e=>console.error("push",e)); },600); }
async function startSync(){
  const cfg=getSyncCfg(); if(!cfg||!cfg.config||!cfg.workspace){ setSyncStatus("off"); return; }
  setSyncStatus("connecting");
  try{
    await ensureFB();
    if(!fbApp){ fbApp = (window.firebase.apps&&window.firebase.apps.length) ? window.firebase.app() : window.firebase.initializeApp(cfg.config); }
    const fs=window.firebase.firestore();
    fbDoc=fs.collection("inventory_sync").doc(cfg.workspace);
    const snap=await fbDoc.get();
    if(snap.exists && snap.data() && snap.data().data){ adoptRemote(snap.data().data); }
    else { await pushNow(); }
    if(fbUnsub)fbUnsub();
    fbUnsub=fbDoc.onSnapshot(s=>{ if(s.metadata.hasPendingWrites)return; const d=s.data(); if(d&&d.data) adoptRemote(d.data); },
      e=>{ console.error("snap",e); setSyncStatus("error"); });
    setSyncStatus("live");
  }catch(e){ console.error("sync",e); setSyncStatus("error"); }
}
function connectSync(){
  const ws=$("sy-ws").value.trim(), cfgTxt=$("sy-cfg").value.trim();
  if(!ws||!cfgTxt)return toast(t("sync_need"),"err");
  const cfg=parseCfg(cfgTxt); if(!cfg||!cfg.projectId)return toast(t("sync_bad_cfg"),"err");
  localStorage.setItem(SYNC_KEY,JSON.stringify({workspace:ws,config:cfg}));
  toast(t("sync_connected"),"ok"); startSync();
}
function disconnectSync(){ if(fbUnsub){fbUnsub();fbUnsub=null;} fbDoc=null; localStorage.removeItem(SYNC_KEY); setSyncStatus("off"); toast(t("sync_disconnected"),"ok"); }

  ar:{t:"استقبال المحاليل والفحص",s:["للأصناف المعتمدة: استخدم «إضافة من القائمة المعتمدة» ← اختر المجموعة ثم الصنف، وأدخل عدد الكتات/العلب فتُحسب الكمية الكاملة وتُملأ تلقائياً.","أو أدخل كود المنتج يدوياً؛ إن كان موجوداً تُعبّأ بياناته تلقائياً.","أدخل رقم التشغيلة وتاريخ الانتهاء والكمية.","اختر «المختبر المستلِم» و«نتيجة الفحص» (مقبول/مرفوض). التشغيلة المرفوضة لا تُحتسب ضمن المتاح ولا يمكن صرفها. احفظ الاستلام (مع إمكانية طباعة الباركود)."]},
  en:{t:"Receiving & inspection",s:["For approved items: use “Add from the approved list” ← pick the group then the item, enter the number of kits/boxes, and the full quantity is computed and filled automatically.","Or type the product code manually; existing items auto-fill.","Enter the lot number, expiry date, and quantity.","Choose the receiving lab and inspection result (Accepted/Rejected). A rejected lot is excluded from available stock and cannot be dispensed. Save the receipt (you can print the barcode)."]}},
 {ic:"🧊",cls:"g-blue",
  ar:{t:"المخزون والتشغيلات",s:["افتح «المخزون» لرؤية كل الأصناف وكمياتها المتاحة وحالتها.","استخدم البحث والفلاتر (متوفر/تنبيه/منتهي/نافد) لتصفية القائمة.","اضغط 👁 لعرض تشغيلات الصنف، أو ✏️ لتعديله، أو 🗑 لحذفه.","من جدول التشغيلات أضف تشغيلة، أو عدّل الكمية ⚖️ (جرد/تالف)، أو احذف تشغيلة."]},
  en:{t:"Inventory & lots",s:["Open “Inventory” to see all items, available quantities, and status.","Use search and filters (In stock / Alert / Expired / Out) to narrow the list.","Click 👁 to view an item’s lots, ✏️ to edit it, or 🗑 to delete it.","From the lots table, add a lot, adjust ⚖️ a quantity (count/damaged), or delete a lot."]}},
 {ic:"📤",cls:"g-cyan",
  ar:{t:"الصرف من المخزون",s:["افتح «صرف وإخراج» واختر الصنف؛ يظهر المتاح والتشغيلات مرتّبة حسب الأقرب انتهاءً.","أدخل الكمية المطلوبة واختر المختبر المستلِم.","يتم الصرف تلقائياً من أقرب تشغيلة للانتهاء (FIFO)؛ أكّد الصرف وتُسجَّل الحركة في السجل."]},
  en:{t:"Dispensing (FIFO)",s:["Open “Dispense” and select the item; available stock and earliest-expiring lots appear.","Enter the required quantity and choose the receiving lab.","Stock is dispensed automatically from the earliest-expiring lot (FIFO); confirm and it’s logged."]}},
 {ic:"🏷️",cls:"g-cyan",
  ar:{t:"طباعة الباركود",s:["افتح «طباعة الباركود» واختر صنفاً أو أدخل الكود يدوياً.","عدّل اسم الملصق والتشغيلة وتاريخ الانتهاء (نظام Code 39).","حدّد عدد النسخ واطبع — يعمل دون اتصال على معظم الطابعات والماسحات."]},
  en:{t:"Barcode printing",s:["Open “Barcode printing” and pick an item or type the code manually.","Adjust the label name, lot, and expiry (Code 39).","Set the number of copies and print — works offline with most printers and scanners."]}},
 {ic:"📊",cls:"g-pink",
  ar:{t:"التقارير والتصدير",s:["افتح «التقارير» لرؤية التشغيلات المنتهية/القريبة والأكثر استهلاكاً.","صدّر أي تقرير بصيغة Excel/CSV: المخزون، الحركات، الانتهاء، الاستهلاك، استهلاك المختبرات.","استخدم «طباعة الصفحة» لطباعة تقرير جاهز."]},
  en:{t:"Reports & export",s:["Open “Reports” to see expired/near-expiry lots and the most-consumed items.","Export any report as Excel/CSV: inventory, movements, expiry, consumption, lab consumption.","Use “Print page” to print a ready report."]}},
 {ic:"⚙️",cls:"g-orange",
  ar:{t:"الإعدادات والمزامنة بين الأجهزة",s:["من «الإعدادات» غيّر كلمة مرورك وأيام التنبيه قبل الانتهاء.","أضف مختبرات خاصة تظهر في الاستقبال والصرف.","لتفعيل المزامنة بين الأجهزة: أنشئ مشروع Firebase وفعّل Firestore، والصق إعداد firebaseConfig مع معرّف مساحة موحّد على كل الأجهزة — فتتشارك جميع الأجهزة نفس البيانات والحسابات.","النسخ الاحتياطي وتفريغ البيانات متاحان للمدير فقط."]},
  en:{t:"Settings & multi-device sync",s:["In “Settings” change your password and the alert days before expiry.","Add custom labs shown in receive/dispense.","To enable multi-device sync: create a Firebase project, enable Firestore, and paste the firebaseConfig with one shared Workspace ID on every device — all devices then share the same data and accounts.","Backup and data wipe are available to admins only."]}},
 {ic:"👥",cls:"g-pink",
  ar:{t:"إدارة المستخدمين (للمدير)",s:["من «إدارة المستخدمين» (تظهر للمدير فقط) أضف حساباً جديداً باسم مستخدم وكلمة مرور وصلاحية.","الصلاحيات: «مستخدم» للعمل اليومي، و«مدير» لإدارة الحسابات والإعدادات والنسخ الاحتياطي.","ترقية حساب من «مستخدم» إلى «مدير» (أو العكس) تتم عبر المدير فقط بزر الترقية.","يمكن للمدير تغيير كلمة مرور أي مستخدم أو حذفه، مع بقاء مدير واحد على الأقل."]},
  en:{t:"User management (admin)",s:["In “User management” (visible to admins only) add a new account with a username, password, and role.","Roles: “User” for daily work, “Admin” to manage accounts, settings, and backups.","Promoting an account from “User” to “Admin” (or back) is done by an admin only, via the promote button.","An admin can change any user’s password or delete them, while keeping at least one admin."]}},
];
function openGuide(){
  const body=`<p class="guide-intro">${esc(t("guide_intro"))}</p>`+GUIDE.map((g,i)=>{const G=LANG==="en"?g.en:g.ar;
    return `<div class="gcard ${g.cls}" id="gc-${i}"><div class="gcard-h" onclick="App.guideToggle(${i})"><div class="gcard-ic">${g.ic}</div><div class="gcard-t"><b>${esc(G.t)}</b><span>${G.s.length} ${t("steps_word")}</span></div><div class="gcard-ch">‹</div></div><div class="gcard-b"><ol>${G.s.map(x=>`<li>${esc(x)}</li>`).join("")}</ol></div></div>`;
  }).join("");
  modal(t("guide_title"),body);
}
function guideToggle(i){ const c=$("gc-"+i); if(c) c.classList.toggle("open"); }

/* expose */
return {init,login,logout,go,toggleSide,toggleLang,closeModal,
  onCodeType,expHint,doReceive,catGroup,catItem,catKits,
  dispenseInfo,doDispense,
  renderBarcode,bcFromItem,pickBarcode,printBarcode,
  toggleLots,editItem,delItem,addLot,adjustLot,delLot,
  exportCSV,saveSettings,addLab,delLab,backup,restore,reseed,wipe,
  addUser,setRole,resetUserPass,delUser,
  addProduct,importTemplate,importFile,importRows,toggleCollapse,
  connectSync,disconnectSync,openGuide,guideToggle};
})();
window.App = App;
App.init();
</script>
